version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wastenot-db
    environment:
      POSTGRES_DB: wastenot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - wastenot_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wastenot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wastenot_db_data:
