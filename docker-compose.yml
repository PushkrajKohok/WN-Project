version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wastenot-db
    environment:
      POSTGRES_DB: wastenot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - wastenot_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wastenot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    container_name: wastenot-api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wastenot
      API_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ENVIRONMENT: development
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  wastenot_db_data:
