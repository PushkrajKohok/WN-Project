services:
  - type: web
    name: wastenot-api
    runtime: docker
    rootDir: apps/api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
